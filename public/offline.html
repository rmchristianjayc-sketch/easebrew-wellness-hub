<!DOCTYPE html>
<html lang="fil">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#39613B" />
  <title>EaseBrew — Walang Internet</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #EEE5D4;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      text-align: center;
    }
    .card {
      background: white;
      border-radius: 20px;
      padding: 40px 32px;
      max-width: 360px;
      width: 100%;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    }
    .icon {
      font-size: 64px;
      margin-bottom: 20px;
      display: block;
    }
    h1 {
      color: #1B201A;
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 12px;
      line-height: 1.3;
    }
    p {
      color: #4E504F;
      font-size: 16px;
      line-height: 1.6;
      margin-bottom: 8px;
    }
    .tip {
      background: #f0f7f0;
      border-radius: 12px;
      padding: 16px;
      margin: 24px 0;
      color: #39613B;
      font-size: 15px;
      line-height: 1.6;
    }
    button {
      background: #39613B;
      color: white;
      border: none;
      border-radius: 12px;
      padding: 16px 32px;
      font-size: 17px;
      font-weight: 700;
      cursor: pointer;
      width: 100%;
      margin-top: 8px;
      -webkit-tap-highlight-color: transparent;
    }
    button:active { opacity: 0.85; }
    .logo {
      margin-bottom: 24px;
      color: #39613B;
      font-size: 18px;
      font-weight: 800;
      letter-spacing: 0.5px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">☕ EaseBrew</div>
    <span class="icon">📡</span>
    <h1>Walang Internet Connection</h1>
    <p>Hindi ma-load ang app dahil walang internet ngayon.</p>
    <div class="tip">
      💡 <strong>Gawin ito:</strong><br />
      I-check ang inyong WiFi o mobile data,<br />
      tapos pindutin ang button sa ibaba.
    </div>
    <button onclick="window.location.reload()">
      🔄 Subukan Ulit
    </button>
  </div>
</body>
</html>
